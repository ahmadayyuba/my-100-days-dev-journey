<main class="min-h-screen relative z-10">
  <section class="bg-hero h-screen relative flex">
    <!-- Overlay gelap agar teks lebih mudah dibaca -->

    <!-- Container Content -->
    <!-- PERUBAHAN: ganti items-center & text-center menjadi items-start & text-left -->
    <div class="relative z-10 container max-w-7xl mx-auto min-h-screen flex flex-col justify-center items-start gap-6 text-left px-6 md:px-12">
      
      <!-- Heading (Teks Utama) -->
      <!-- PERUBAHAN: leading-tight agar jarak antar baris tidak terlalu renggang -->
      <h1 class="text-5xl md:text-7xl font-bold text-white mb-2 leading-tight">
        Cita Rasa <br>
        <span class="text-yellow-500 italic">Otentik</span> Medan,<br>
        Rempahnya <br>
        Meresap <br>
        Sampai ke Hati.
      </h1>

      <!-- Deskripsi -->
      <p class="text-white/90 text-lg md:text-xl max-w-2xl font-medium leading-relaxed">
        Masakan khas Medan dengan bumbu warisan keluarga. Dimasak fresh setiap pagi, halal 100%, dan porsinya bikin nagih.
      </p>

      <!-- Tombol Aksi -->
      <div class="flex flex-wrap items-center gap-4 mt-4">
        <button class="bg-[#e64a19] hover:bg-[#d84315] text-white px-8 py-3.5 rounded-full font-semibold flex items-center gap-2 transition-all">

          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path></svg>
          Pesan Antar / Booking Meja
        </button>
        <button class="bg-white/10 hover:bg-white/20 border border-white/30 text-white px-8 py-3.5 rounded-full font-semibold transition-all backdrop-blur-sm">
          Lihat Menu
        </button>
      </div>

      <!-- Info Tambahan Bawah -->
      <div class="flex flex-wrap items-center gap-6 mt-6 text-sm text-yellow-500 font-medium">
        <span class="flex items-center gap-2"><span class="text-white">✓</span> Halal 100%</span>
        <span class="flex items-center gap-2">🛵 <span class="text-white">GoFood & GrabFood</span></span>
        <span class="flex items-center gap-2">🕒 <span class="text-white">Buka 08.00 – 21.00</span></span>
      </div>

    </div>
